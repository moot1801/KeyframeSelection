video:
  input_path: data/videos/drone.mp4
  candidate_num_frames: 100
  image_size: 64
  color_mode: rgb

selection:
  name: arclength_local_refine
  module: keyframe_pipeline.selectors.arclength_local_refine
  class_name: ArclengthLocalRefineSelectionStrategy
  num_frames: 32
  distance_metric: l2
  include_endpoints: true
  local_refine_iterations: 20
  local_refine_window: 30
  kwargs:
    auto_num_frames:
      enabled: true
      frame_limit_enabled: false
      target_gap_ratio: 12.0
      soft_cv_target: 0.25
      density_weight: 1.0
      cv_weight: 0.5
      search_step: 10
      refine_candidates: false
    precluster:
      enabled: true
      global_percentile: 99.0
      local_window: 5
      local_mad_multiplier: 3.5
      min_local_median_ratio: 8.0
      min_local_threshold_ratio: 3.0
      max_neighbor_high_count: 1
      min_cluster_frames: 30
      min_frames_per_cluster: 2
model:
  name: conv_autoencoder
  module: keyframe_pipeline.models.conv_autoencoder
  class_name: ConvAutoEncoder
  latent_dim: 3
  kwargs:
    encoder_channels: [32, 64, 128, 256]
    activation: relu
    output_activation: sigmoid

optimizer:
  name: adam
  module: keyframe_pipeline.optimizers.torch_optimizers
  class_name: AdamOptimizerStrategy
  learning_rate: 0.001
  weight_decay: 0.0
  momentum: 0.0

loss:
  name: mse
  module: keyframe_pipeline.losses.basic
  class_name: MSELossStrategy

train:
  epochs: 200
  batch_size: 16
  seed: 42
  num_workers: 0
  device: auto

output:
  output_dir: artifacts/keyframe_selection/drone_rgb
  selected_csv: selected_frames.csv
  selected_frame_dir: selected_frames
  uniform_frame_dir: uniform_frames
  frame_index_plot: frame_index_comparison.png
  timeline_comparison_video: timeline_comparison.mp4
  selected_vs_uniform_video: selected_vs_uniform.mp4
  selected_vs_uniform_interval_sec: 0.5
  latent_html: latent_space.html
  latent_npz: all_frame_latents.npz
  checkpoint: autoencoder.pt
  metrics_json: selection_metrics.json
  save_selected_original_size: true

visualization:
  name: plotly_latent_controls
  module: keyframe_pipeline.visualizers.plotly_latent_controls
  class_name: PlotlyLatentControlsVisualizationStrategy
  dimensions: 3
  annotate_every: 5
  show_all_candidates: true
  show_selected_path: true
  kwargs:
    show_candidate_frames: true
    show_selected_path: true
    show_selected_frames: true
    show_selected_labels: true
    show_candidate_order: false
    show_linear_view: false
    candidate_order_every: 10
